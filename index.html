<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ada yang Nunggu Kamu di Sini 👀</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3d;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --text: #f0f0f5;
    --muted: #888899;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: .4;
  }

  /* ── FLOATING BLOBS ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: .12;
    pointer-events: none;
    animation: drift 20s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -7s; }
  .blob-3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 60%; animation-delay: -13s; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ──────────── RIDDLE PAGE ──────────── */
  #riddle-page {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .riddle-header {
    font-family: 'Syne', sans-serif;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    letter-spacing: .3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp .6s .2s forwards;
  }

  .riddle-card {
    width: min(560px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    position: relative;
    opacity: 0;
    animation: fadeUp .6s .4s forwards;
  }
  .riddle-card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 40%, transparent 60%, var(--accent3) 100%);
    z-index: -1;
    opacity: .5;
  }

  .step-indicator {
    display: flex; gap: .5rem; margin-bottom: 2rem;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: background .3s, transform .3s;
  }
  .step-dot.active { background: var(--accent); transform: scale(1.4); }
  .step-dot.done   { background: var(--accent3); }

  .riddle-label {
    font-size: .72rem;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: .75rem;
  }

  .riddle-question {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.2rem, 3.5vw, 1.6rem);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: .75rem;
  }

  .riddle-hint {
    font-size: .78rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 1.75rem;
    min-height: 1.2em;
  }

  .input-row {
    display: flex; gap: .75rem;
  }

  .answer-input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: .85rem 1.1rem;
    outline: none;
    transition: border-color .2s;
  }
  .answer-input:focus { border-color: var(--accent); }
  .answer-input.shake {
    animation: shake .4s ease;
    border-color: #ff4444;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
  }

  .btn-check {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    padding: .85rem 1.4rem;
    cursor: pointer;
    transition: background .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-check:hover  { background: #ff8255; }
  .btn-check:active { transform: scale(.96); }

  .feedback {
    margin-top: 1rem;
    font-size: .82rem;
    min-height: 1.4em;
    color: #ff6666;
    font-style: italic;
    transition: opacity .3s;
  }
  .feedback.correct { color: var(--accent3); }

  .wrong-count-badge {
    position: absolute; top: 1.2rem; right: 1.4rem;
    background: #1e1e2a;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: .7rem;
    padding: .3rem .8rem;
    color: var(--muted);
    letter-spacing: .05em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ──────────── BIRTHDAY PAGE ──────────── */
  #birthday-page {
    display: none;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  #birthday-page.visible {
    display: block;
    animation: fadeIn .8s ease forwards;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* CONFETTI CANVAS */
  #confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
  }

  /* FLOATING EMOJIS */
  .float-emojis {
    position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden;
  }
  .emoji-float {
    position: absolute;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 1; }
    80%  { opacity: .8; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* HERO */
  .bday-hero {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 5;
  }

  .bday-eyebrow {
    font-size: .75rem; letter-spacing: .35em; color: var(--accent2);
    text-transform: uppercase; margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp .5s .3s forwards;
  }

  .bday-main-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 12vw, 9rem);
    font-weight: 800;
    line-height: .9;
    margin-bottom: 2rem;
    opacity: 0; animation: fadeUp .6s .5s forwards;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .bday-message-box {
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 3rem;
    opacity: 0; animation: fadeUp .6s .7s forwards;
    position: relative;
  }
  .bday-message-box::before {
    content: '"';
    position: absolute; top: -.3em; left: .8rem;
    font-size: 5rem; font-family: 'Syne', sans-serif;
    color: var(--accent); opacity: .3; line-height: 1;
  }

  .bday-message {
    font-size: clamp(.9rem, 2.5vw, 1.05rem);
    line-height: 1.9;
    color: #ccccd8;
  }
  .bday-message strong {
    color: var(--accent2);
    font-style: italic;
  }

  /* MATH FACT SECTION */
  .bday-math {
    max-width: 480px;
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    padding: 1.5rem;
    background: rgba(255,107,53,.06);
    opacity: 0; animation: fadeUp .6s .9s forwards;
    text-align: left;
  }
  .bday-math-title {
    font-family: 'Syne', sans-serif;
    font-size: .75rem; letter-spacing: .2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 1rem;
  }
  .bday-math-body {
    font-size: .88rem; line-height: 1.8; color: #bbbbc8;
  }
  .bday-math-body code {
    color: var(--accent2);
    background: rgba(255,209,102,.08);
    padding: .1em .4em; border-radius: 4px;
  }

  /* COUNTDOWN */
  .countdown-wrap {
    padding: 4rem 2rem;
    text-align: center;
    position: relative; z-index: 5;
    border-top: 1px solid var(--border);
  }
  .countdown-label {
    font-size: .72rem; letter-spacing: .3em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 2rem;
  }
  .countdown-display {
    display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
  }
  .cd-unit {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    min-width: 80px;
  }
  .cd-number {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem; font-weight: 800;
    color: var(--accent2);
    display: block;
  }
  .cd-unit-label {
    font-size: .65rem; letter-spacing: .15em; color: var(--muted);
    text-transform: uppercase;
    display: block; margin-top: .25rem;
  }
  .cd-note {
    margin-top: 1.5rem; font-size: .82rem; color: var(--muted); font-style: italic;
  }

  /* SIGNATURE */
  .signature {
    text-align: center; padding: 3rem 2rem;
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 800; color: var(--muted);
    position: relative; z-index: 5;
    border-top: 1px solid var(--border);
  }
  .signature span { color: var(--accent); }
</style>
</head>
<body>

<!-- BACKGROUND BLOBS -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ══════════════════════════════ RIDDLE PAGE ══════════════════════════════ -->
<div id="riddle-page">
  <div class="riddle-header">⚠ Akses Terbatas · Verifikasi Identitas</div>

  <div class="riddle-card" id="riddle-card">
    <div class="wrong-count-badge" id="wrong-badge">❌ 0 salah</div>

    <div class="step-indicator" id="step-dots"></div>

    <div class="riddle-label">Soal <span id="q-number">1</span> dari <span id="q-total">3</span></div>
    <div class="riddle-question" id="riddle-question"></div>
    <div class="riddle-hint" id="riddle-hint"></div>

    <div class="input-row">
      <input class="answer-input" id="answerInput" type="text" placeholder="jawaban kamu..." autocomplete="off" />
      <button class="btn-check" id="checkBtn" onclick="checkAnswer()">Cek →</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- ══════════════════════════════ BIRTHDAY PAGE ══════════════════════════════ -->
<div id="birthday-page">
  <canvas id="confetti-canvas"></canvas>
  <div class="float-emojis" id="floatContainer"></div>

  <div class="bday-hero">
    <div class="bday-eyebrow">🎉 Selamat Datang, Orang Terpilih</div>
    <div class="bday-main-title">HAPPY<br>BIRTH<br>DAY!</div>

    <div class="bday-message-box">
      <p class="bday-message" id="bday-message-text">
        <!-- diisi JS -->
      </p>
    </div>

    <div class="bday-math">
      <div class="bday-math-title">📐 Fakta Matematika Hari Ini</div>
      <div class="bday-math-body" id="math-fact-body"><!-- diisi JS --></div>
    </div>
  </div>

  <div class="countdown-wrap">
    <div class="countdown-label">Hitung mundur ke ulang tahun berikutnya</div>
    <div class="countdown-display">
      <div class="cd-unit"><span class="cd-number" id="cd-days">--</span><span class="cd-unit-label">Hari</span></div>
      <div class="cd-unit"><span class="cd-number" id="cd-hours">--</span><span class="cd-unit-label">Jam</span></div>
      <div class="cd-unit"><span class="cd-number" id="cd-mins">--</span><span class="cd-unit-label">Menit</span></div>
      <div class="cd-unit"><span class="cd-number" id="cd-secs">--</span><span class="cd-unit-label">Detik</span></div>
    </div>
    <div class="cd-note">mulai nabung kado dari sekarang ya 😌</div>
  </div>

  <div class="signature">dibuat dengan <span>π</span> usaha dari nol</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//   ⚙ KONFIGURASI — EDIT BAGIAN INI SESUAI KEBUTUHANMU
// ═══════════════════════════════════════════════════════

const CONFIG = {
  // Nama penerima
  namaPenerima: "Kamu",

  // Tanggal ulang tahun (bulan: 0=Jan, format: YYYY, MM-1, DD)
  birthdayMonth: 8,   // Agustus = 7 (0-indexed) → tulis 8 nanti dikurangi di kode
  birthdayDay:   17,

  // Pesan ucapan (boleh pakai HTML)
  pesanUtama: `Selamat ulang tahun! 🎂<br><br>
  Kamu resmi bertambah tua hari ini. Secara biologis, sel-selmu makin aus. Secara ekonomi, kamu makin dekat pensiun. Secara matematis, umurmu adalah bilangan positif yang <strong>tidak akan pernah mengecil</strong>.<br><br>
  Tapi tenang — kue ulang tahunnya tetap enak. 🍰`,

  // Fakta matematika absurd di halaman birthday
  mathFact: `Setiap lilin yang kamu tiup hari ini melepaskan CO₂ sebesar <code>0.0000003 ton</code>. Dikali jumlah lilin di kuenya, kamu baru saja berkontribusi pada pemanasan global. Selamat! 🌍🔥<br><br>
  Fakta lain: Probabilitas kamu lahir tepat hari ini adalah <code>1 / 365</code>. Artinya, kamu tidak spesial secara statistik. Tapi setidaknya kamu ada. Itu sudah lumayan. ∎`,

  // Soal-soal teka-teki (isi jawabanAnswer dengan lowercase)
  riddles: [
    {
      question:  "2 + 2 = ?",
      hint:      "Petunjuk: jawabannya BUKAN 4. Ini soal spesial.",
      answer:    "ikan",
      altAnswers: [],
      wrongMsgs: [
        "SALAH! Kamu terlalu pintar. Coba berpikir lebih... tidak masuk akal 🐟",
        "Bukan itu! Hint: makhluk hidup, ada siripnya, berenang",
        "4?? 22?? Ini bukan matematika biasa bro, ini SENI 🎨",
      ]
    },
    {
      question:  "Jika kecepatan mie instan = 3 menit, berapa lama kamu menunggu gebetan balas chat?",
      hint:      "Satuan jawabannya: tahun",
      answer:    "selamanya",
      altAnswers: ["∞", "infinity", "tak terhingga", "gak pernah", "tidak pernah", "forever"],
      wrongMsgs: [
        "Salah! Terlalu optimis kamu 😭",
        "Bukan angka itu... lebih besar. JAUH lebih besar.",
        "Masa segitu doang? Kamu belum pernah nunggu kayaknya 💀",
      ]
    },
    {
      question:  "∑(alasan males olahraga) dari i=1 sampai ∞ = ?",
      hint:      "Ini soal yang jawabannya bisa kamu rasain setiap senin pagi",
      answer:    "besok aja",
      altAnswers: ["besok", "nanti", "nanti aja", "besok aja deh", "entar"],
      wrongMsgs: [
        "Salah! Tapi kamu pasti tau jawabannya dari pengalaman pribadi 🛋️",
        "Bukan itu... coba tanya diri sendiri tiap kali alarm gym bunyi",
        "Hmm, sepertinya kamu terlalu rajin untuk bisa jawab ini 😂",
      ]
    },
  ]
};

// ═══════════════════════════════════════════════════════
//   LOGIC — JANGAN DIUBAH KECUALI KAMU TAU APA YANG
//   KAMU LAKUKAN
// ═══════════════════════════════════════════════════════

let currentRiddle = 0;
let wrongCount    = 0;
let wrongPerRiddle = [0, 0, 0];

function init() {
  const total = CONFIG.riddles.length;
  document.getElementById('q-total').textContent = total;

  // Build step dots
  const dotsEl = document.getElementById('step-dots');
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    dotsEl.appendChild(d);
  }
  loadRiddle(0);

  // Enter key
  document.getElementById('answerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });
}

function loadRiddle(idx) {
  const r = CONFIG.riddles[idx];
  document.getElementById('q-number').textContent = idx + 1;
  document.getElementById('riddle-question').textContent = r.question;
  document.getElementById('riddle-hint').textContent     = r.hint;
  document.getElementById('answerInput').value           = '';
  document.getElementById('feedback').textContent        = '';
  document.getElementById('feedback').className          = 'feedback';
  document.getElementById('answerInput').focus();
}

function checkAnswer() {
  const inp = document.getElementById('answerInput');
  const val = inp.value.toLowerCase().trim();
  const r   = CONFIG.riddles[currentRiddle];

  const correct_answers = [r.answer, ...(r.altAnswers || [])];
  const isCorrect = correct_answers.includes(val);

  if (isCorrect) {
    document.getElementById('feedback').textContent  = '✓ Benar! Lanjut...';
    document.getElementById('feedback').className    = 'feedback correct';
    updateDot(currentRiddle, 'done');

    setTimeout(() => {
      currentRiddle++;
      if (currentRiddle >= CONFIG.riddles.length) {
        showBirthday();
      } else {
        updateDot(currentRiddle, 'active');
        loadRiddle(currentRiddle);
      }
    }, 700);

  } else {
    wrongCount++;
    wrongPerRiddle[currentRiddle]++;
    document.getElementById('wrong-badge').textContent = `❌ ${wrongCount} salah`;

    const msgs  = r.wrongMsgs;
    const msgIdx = Math.min(wrongPerRiddle[currentRiddle] - 1, msgs.length - 1);
    document.getElementById('feedback').textContent = msgs[msgIdx];

    inp.classList.remove('shake');
    void inp.offsetWidth; // reflow
    inp.classList.add('shake');
    inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once: true });
  }
}

function updateDot(idx, state) {
  const d = document.getElementById('dot-' + idx);
  if (!d) return;
  d.className = 'step-dot ' + state;
}

function showBirthday() {
  document.getElementById('riddle-page').style.display   = 'none';
  const bp = document.getElementById('birthday-page');
  bp.classList.add('visible');

  // Isi konten
  document.getElementById('bday-message-text').innerHTML = CONFIG.pesanUtama.replace('[nama]', CONFIG.namaPenerima);
  document.getElementById('math-fact-body').innerHTML    = CONFIG.mathFact;

  // Confetti
  startConfetti();

  // Floating emojis
  startFloatingEmojis();

  // Countdown
  startCountdown();
}

// ── CONFETTI ──────────────────────────────────────────
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const COLORS = ['#ff6b35','#ffd166','#06d6a0','#ef476f','#118ab2','#a8dadc'];
  const pieces = [];

  for (let i = 0; i < 180; i++) {
    pieces.push({
      x:    Math.random() * canvas.width,
      y:    Math.random() * canvas.height - canvas.height,
      w:    6 + Math.random() * 8,
      h:    10 + Math.random() * 6,
      r:    Math.random() * Math.PI * 2,
      dr:   (Math.random() - .5) * .15,
      dy:   2 + Math.random() * 3,
      dx:   (Math.random() - .5) * 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = .85;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();

      p.y  += p.dy;
      p.x  += p.dx;
      p.r  += p.dr;
      if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
    });
    frame++;
    if (frame < 600) requestAnimationFrame(draw); // stop after ~10s
    else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}

// ── FLOATING EMOJIS ────────────────────────────────────
function startFloatingEmojis() {
  const container = document.getElementById('floatContainer');
  const emojis    = ['🎂','🎉','🎊','✨','🎁','🥳','🌟','💫','🎈','❤️','🦄'];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'emoji-float';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left     = Math.random() * 100 + 'vw';
    el.style.animationDuration = (8 + Math.random() * 10) + 's';
    el.style.animationDelay   = (Math.random() * 12) + 's';
    container.appendChild(el);
  }
}

// ── COUNTDOWN ─────────────────────────────────────────
function startCountdown() {
  function tick() {
    const now   = new Date();
    let   bday  = new Date(now.getFullYear(), CONFIG.birthdayMonth - 1, CONFIG.birthdayDay, 0, 0, 0);
    if (bday <= now) bday.setFullYear(now.getFullYear() + 1);
    const diff  = bday - now;
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);
    document.getElementById('cd-days').textContent  = String(days).padStart(3,'0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(secs).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);
}

// ── BOOT ──────────────────────────────────────────────
init();
</script>
